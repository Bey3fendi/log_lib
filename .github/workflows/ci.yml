name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python for coverage tooling
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            cppcheck \
            libgtest-dev \
            lcov \
            nlohmann-json3-dev
          python -m pip install --upgrade pip gcovr

      - name: Build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON
          cmake --build build --parallel

      - name: Run unit tests with coverage
        run: |
          cmake -S . -B build-coverage \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DCMAKE_SHARED_LINKER_FLAGS="--coverage"
          cmake --build build-coverage --parallel
          ctest --test-dir build-coverage --output-on-failure --output-junit junit.xml
          mkdir -p coverage
          gcovr \
            --root . \
            --object-directory build-coverage \
            --xml-pretty coverage.xml \
            --lcov lcov.info \
            --html-details coverage/index.html

      - name: Static analysis
        id: static_analysis
        continue-on-error: true
        run: |
          mkdir -p static-analysis
          cppcheck \
            --enable=all \
            --inconclusive \
            --std=c++17 \
            --language=c++ \
            --xml \
            --xml-version=2 \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            src tests 2> static-analysis/cppcheck-report.xml

      - name: Upload test, coverage, and analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            coverage/**
            coverage.xml
            lcov.info
            junit.xml
            static-analysis/**

      - name: Fail job on static analysis findings
        if: always() && steps.static_analysis.outcome == 'failure'
        run: exit 1
